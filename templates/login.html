{{ define "login.html" }}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Sign in · keeppio-runner ({{ .Env }})</title>
  <link rel="icon" href="/static/img/keepp-icon.svg" type="image/svg+xml">
  <script>
    (function() {
      var pref = localStorage.getItem('theme');
      var dark = pref ? pref === 'dark' : true;
      if (dark) document.documentElement.classList.add('dark');
    })();
  </script>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="login-shell">
  <form action="/login.submit" method="post" class="login-card" autocomplete="on">
    <div class="login-env-band" data-env="{{ .Env }}"></div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
      <img src="/static/img/keepp-icon.svg" alt="" style="height:28px;width:28px;filter:invert(1)">
      <div>
        <div style="font-size:15px;font-weight:600;letter-spacing:-0.01em">keeppio-runner</div>
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--color-ink-3)">{{ .Env }}</div>
      </div>
    </div>
    {{ if .Error }}
    <div style="margin-bottom:12px;padding:8px 10px;border-radius:var(--radius-2);background:var(--color-bad-soft);color:var(--color-bad);font-size:12px">{{ .Error }}</div>
    {{ end }}
    <label for="username" style="display:block;margin-bottom:4px">Username</label>
    <input id="username" name="username" value="admin" autofocus autocomplete="username" style="margin-bottom:12px">
    <label for="password" style="display:block;margin-bottom:4px">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" style="margin-bottom:18px">
    <button class="btn btn-primary" type="submit" style="width:100%;height:36px;justify-content:center">Sign in</button>
  </form>
</body>
</html>
{{ end }}
